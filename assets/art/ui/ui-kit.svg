<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1640" viewBox="0 0 1280 1640" role="img" aria-labelledby="title desc">
  <title id="title">童年小镇童话风 UI 图形库</title>
  <desc id="desc">根据参考图重做的木牌标题、彩色缎带、奶油面板、棋盘格、按钮和合成物图形库。</desc>
  <defs>
    <style>
      .bg { fill: #fff3d8; }
      .ink { fill: #5a2d10; }
      .title { font: 800 42px sans-serif; fill: #5a2d10; }
      .section { font: 800 25px sans-serif; fill: #5a2d10; }
      .label { font: 700 18px sans-serif; fill: #5a2d10; }
      .white { font: 800 22px sans-serif; fill: #fffaf0; stroke: #5a2d10; stroke-width: 1.5; paint-order: stroke; }
      .small { font: 400 15px sans-serif; fill: #8e6a37; }
      .panel { fill: #fff8e7; stroke: #d3ad61; stroke-width: 4; rx: 16; }
      .cell { fill: #fff4d6; stroke: #dcc48e; stroke-width: 4; rx: 14; }
      .highlight { fill: #fff0a7; stroke: #eeb43c; stroke-width: 6; rx: 14; }
      .wood { fill: #a96424; stroke: #704217; stroke-width: 5; rx: 18; }
      .board { fill: #d2bc65; stroke: #b9993e; stroke-width: 6; rx: 22; }
      .button-text { font: 800 30px sans-serif; fill: #fffaf0; stroke: #5a2d10; stroke-width: 2; paint-order: stroke; }
      .piece-name { font: 700 17px sans-serif; fill: #5a2d10; }
      .advanced-aura { fill: none; stroke: #ffe58a; stroke-width: 5; }
      .advanced-badge { fill: #ffd45a; stroke: #8b5a12; stroke-width: 4; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="1500" />
  <text x="64" y="76" class="title">童年小镇童话风 UI 图形库</text>
  <text x="64" y="110" class="small">新版方向：奶油纸底、木牌标题、彩色缎带、厚圆角棋盘、花草装饰、手绘小镇物件。</text>

  <text x="64" y="174" class="section">顶部区域</text>
  <rect x="374" y="206" width="430" height="110" class="wood" />
  <path d="M410 222 C360 200 330 235 352 262 C315 263 302 298 338 315 L842 315 C876 294 862 262 828 262 C852 232 820 202 774 222 Z" fill="#6da33f" opacity="0.85" />
  <text x="589" y="278" text-anchor="middle" font-size="58" font-family="sans-serif" font-weight="800" fill="#fff4c8" stroke="#5a2d10" stroke-width="5" paint-order="stroke">童年小镇</text>
  <text x="438" y="346" class="small">wood-title-sign</text>

  <rect x="64" y="218" width="174" height="96" class="panel" />
  <rect x="88" y="274" width="112" height="22" rx="10" fill="#88c446" stroke="#639b2f" stroke-width="4" />
  <path d="M110 270 L134 232 L166 270 Z" fill="#e7a52f" stroke="#704217" stroke-width="4" />
  <text x="103" y="346" class="small">windmill-side-card</text>

  <rect x="928" y="218" width="194" height="58" class="panel" />
  <circle cx="964" cy="247" r="22" fill="#eeb43c" stroke="#a56b18" stroke-width="4" />
  <text x="1034" y="256" text-anchor="middle" class="label" font-size="28">2456</text>
  <circle cx="1094" cy="247" r="18" fill="#79b847" stroke="#4f7b2d" stroke-width="4" />
  <text x="1094" y="255" text-anchor="middle" class="white">+</text>
  <text x="952" y="306" class="small">currency-pill</text>

  <text x="64" y="410" class="section">数据卡与缎带</text>
  <g transform="translate(64 446)">
    <rect width="250" height="116" class="panel" />
    <path d="M55 -14 L195 -14 L180 7 L195 28 L55 28 L70 7 Z" fill="#87b842" stroke="#5a2d10" stroke-width="4" />
    <text x="125" y="14" text-anchor="middle" class="white">分数</text>
    <text x="125" y="80" text-anchor="middle" font-size="48" font-family="sans-serif" font-weight="800" fill="#5a2d10">1260</text>
  </g>
  <g transform="translate(364 446)">
    <rect width="250" height="116" class="panel" />
    <path d="M55 -14 L195 -14 L180 7 L195 28 L55 28 L70 7 Z" fill="#e7a52f" stroke="#5a2d10" stroke-width="4" />
    <text x="125" y="14" text-anchor="middle" class="white">最高</text>
    <text x="125" y="80" text-anchor="middle" font-size="48" font-family="sans-serif" font-weight="800" fill="#5a2d10">8320</text>
  </g>
  <g transform="translate(664 446)">
    <rect width="250" height="116" class="panel" />
    <path d="M45 -14 L205 -14 L190 7 L205 28 L45 28 L60 7 Z" fill="#5a91c7" stroke="#5a2d10" stroke-width="4" />
    <text x="125" y="14" text-anchor="middle" class="white">当前回合</text>
    <text x="125" y="80" text-anchor="middle" font-size="48" font-family="sans-serif" font-weight="800" fill="#5a2d10">28</text>
  </g>

  <text x="64" y="650" class="section">棋盘与格子</text>
  <g transform="translate(64 692)">
    <rect width="696" height="696" class="board" />
    <circle cx="28" cy="24" r="24" fill="#83aa36" opacity="0.55" />
    <circle cx="668" cy="670" r="24" fill="#83aa36" opacity="0.55" />
    <g transform="translate(28 28)">
      <rect width="106" height="106" class="cell" />
      <rect x="112" width="106" height="106" class="highlight" />
      <rect x="224" width="106" height="106" class="cell" />
      <rect y="112" width="106" height="106" class="cell" />
      <rect x="112" y="112" width="106" height="106" class="cell" />
      <rect x="224" y="112" width="106" height="106" class="cell" />
    </g>
  </g>
  <text x="820" y="724" class="small">rounded-board-frame</text>
  <text x="820" y="754" class="small">inset-board-cell</text>
  <text x="820" y="784" class="small">highlighted-drop-cell</text>

  <text x="64" y="1212" class="section">合成物图形</text>
  <g transform="translate(64 1250)">
    <g>
      <rect width="120" height="120" class="cell" />
      <rect x="28" y="52" width="64" height="34" rx="8" fill="#88c446" stroke="#639b2f" stroke-width="4" />
      <circle cx="54" cy="62" r="5" fill="#fff1a8" />
      <circle cx="74" cy="72" r="5" fill="#fff1a8" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">草地</text>
    </g>
    <g transform="translate(150)">
      <rect width="120" height="120" class="cell" />
      <circle cx="60" cy="58" r="34" fill="#9ac958" stroke="#5f9434" stroke-width="4" />
      <circle cx="46" cy="50" r="7" fill="#fff4c4" />
      <circle cx="76" cy="54" r="7" fill="#fff4c4" />
      <circle cx="62" cy="72" r="7" fill="#fff4c4" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">花丛</text>
    </g>
    <g transform="translate(300)">
      <rect width="120" height="120" class="cell" />
      <rect x="54" y="60" width="14" height="36" rx="5" fill="#8a5b2b" />
      <circle cx="60" cy="48" r="35" fill="#78b948" stroke="#4c822f" stroke-width="4" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">小树</text>
    </g>
    <g transform="translate(450)">
      <rect width="120" height="120" class="cell" />
      <rect x="32" y="58" width="56" height="38" rx="6" fill="#f5d37d" stroke="#965122" stroke-width="4" />
      <path d="M26 60 L60 32 L94 60 Z" fill="#d98839" stroke="#965122" stroke-width="4" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">木屋</text>
    </g>
    <g transform="translate(600)">
      <rect width="120" height="120" class="cell" />
      <circle cx="60" cy="62" r="30" fill="#eadb9a" stroke="#5a8d43" stroke-width="4" />
      <circle cx="60" cy="60" r="13" fill="#72b8dd" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">小院</text>
    </g>
    <g transform="translate(750)">
      <rect width="120" height="120" class="cell" />
      <rect x="30" y="56" width="26" height="42" rx="5" fill="#f0c771" stroke="#a86822" stroke-width="4" />
      <rect x="64" y="44" width="30" height="54" rx="5" fill="#deaa55" stroke="#a86822" stroke-width="4" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">小镇</text>
    </g>
    <g transform="translate(900)">
      <rect width="120" height="120" class="cell" />
      <rect x="30" y="50" width="60" height="48" rx="6" fill="#9eb8d8" stroke="#667c9f" stroke-width="4" />
      <path d="M32 50 L44 28 L56 50 Z" fill="#3c7bc1" />
      <path d="M66 50 L78 26 L92 50 Z" fill="#3c7bc1" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">城堡</text>
    </g>
  </g>

  <text x="64" y="1432" class="section">高级道具品质</text>
  <g transform="translate(64 1464)">
    <g>
      <rect width="120" height="120" class="cell" />
      <circle cx="60" cy="58" r="43" class="advanced-aura" />
      <circle cx="60" cy="58" r="34" fill="#9ac958" stroke="#5f9434" stroke-width="4" />
      <circle cx="46" cy="50" r="7" fill="#fff4c4" />
      <circle cx="76" cy="54" r="7" fill="#fff4c4" />
      <circle cx="62" cy="72" r="7" fill="#fff4c4" />
      <circle cx="94" cy="26" r="15" class="advanced-badge" />
      <path d="M94 16 L98 24 L107 26 L98 30 L94 39 L90 30 L81 26 L90 24 Z" fill="#fff8c9" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">高级花丛</text>
    </g>
    <g transform="translate(150)">
      <rect width="120" height="120" class="cell" />
      <circle cx="60" cy="58" r="43" class="advanced-aura" />
      <rect x="54" y="60" width="14" height="36" rx="5" fill="#8a5b2b" />
      <circle cx="60" cy="48" r="35" fill="#78b948" stroke="#4c822f" stroke-width="4" />
      <circle cx="94" cy="26" r="15" class="advanced-badge" />
      <path d="M94 16 L98 24 L107 26 L98 30 L94 39 L90 30 L81 26 L90 24 Z" fill="#fff8c9" />
      <text x="60" y="108" text-anchor="middle" class="piece-name">高级小树</text>
    </g>
    <text x="330" y="38" class="small">高级道具 = 原图形 + 金色光环 + 星章</text>
    <text x="330" y="70" class="small">4 个及以上同级合成产出高级下一级；高级道具参与合成时得分 x2。</text>
  </g>

  <text x="64" y="1592" class="section">按钮与底部托盘</text>
  <g transform="translate(350 1578)">
    <rect x="-220" y="-28" width="210" height="70" rx="16" fill="#eeb43c" stroke="#5a2d10" stroke-width="5" />
    <text x="-115" y="18" text-anchor="middle" class="button-text">↶</text>
    <rect x="20" y="-28" width="210" height="70" rx="16" fill="#d96948" stroke="#5a2d10" stroke-width="5" />
    <text x="125" y="18" text-anchor="middle" class="button-text">↻</text>
  </g>
</svg>
